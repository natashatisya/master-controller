<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Controller Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎛️</text></svg>" />
    <link rel="shortcut icon" href="data:," />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        /* HEADER */
        .header { background: #1e293b; padding: 16px 40px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-dot { width: 10px; height: 10px; background: #38bdf8; border-radius: 50%; box-shadow: 0 0 8px #38bdf8; }
        .header h1 { color: #ffffff; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
        .header-time { color: #6a7c96; font-size: 13px; }

        /* CONTAINER */
        .container { padding: 32px 40px; max-width: 1300px; margin: 0 auto; }

        /* API KEY SECTION */
        .api-key-section { background: #1e293b; border-radius: 10px; padding: 24px; margin-bottom: 28px; border: 1px solid #0ea5e9; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .api-key-section .label { color: #38bdf8; font-size: 13px; font-weight: 600; white-space: nowrap; }
        .api-key-input { flex: 1; min-width: 200px; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 6px; font-size: 13px; outline: none; }
        .api-key-input:focus { border-color: #0ea5e9; }
        .btn-connect { background: #0ea5e9; color: #ffffff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
        .btn-connect:hover { background: #38bdf8; }

        /* STATS */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: #1e293b; border-radius: 10px; padding: 20px 24px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .stat-card .stat-info h3 { color: #8699b4; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-card .number { font-size: 32px; font-weight: 700; }
        .stat-card.total .number { color: #38bdf8; }
        .stat-card.online .number { color: #22c55e; }
        .stat-card.offline .number { color: #ef4444; }
        .stat-icon { font-size: 28px; opacity: 0.4; }

        /* SECTION */
        .section { background: #1e293b; border-radius: 10px; padding: 24px; margin-bottom: 24px; border: 1px solid #334155; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #334155; }
        .section-header h2 { color: #ffffff; font-size: 15px; font-weight: 600; }
        .refresh-btn { background: transparent; color: #6a7c96; border: 1px solid #334155; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .refresh-btn:hover { background: #334155; color: #38bdf8; }

        /* HOST CARD */
        .host-card { background: #0f172a; border-radius: 8px; padding: 16px 20px; margin-bottom: 12px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; transition: border-color 0.2s; }
        .host-card:hover { border-color: #0ea5e9; }
        .host-card:last-child { margin-bottom: 0; }
        .host-info h3 { color: #e2e8f0; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .host-info p { color: #6a7c96; font-size: 12px; line-height: 1.6; }

        /* METRICS */
        .metrics { display: flex; gap: 24px; }
        .metric { text-align: center; }
        .metric label { display: block; color: #6a7c96; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .metric span { color: #e2e8f0; font-size: 15px; font-weight: 700; }

        /* STATUS + DEPLOY */
        .host-actions { display: flex; align-items: center; gap: 10px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
        .status-online { background: #12572c; color: #3aff82; border: 1px solid #16a34a; }
        .status-offline { background: #681616; color: #ff7575; border: 1px solid #b91c1c; }
        .deploy-btn { background: #1e3a4a; color: #38bdf8; border: 1px solid #0ea5e9; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .deploy-btn:hover { background: #0ea5e9; color: #ffffff; }
        .deploy-btn:disabled { background: #1e293b; color: #334155; border-color: #334155; cursor: not-allowed; }
        .delete-btn { background: transparent; color: #ef4444; border: 1px solid #7f1d1d; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .delete-btn:hover { background: #7f1d1d; }

        /* DEPLOYMENT CARD */
        .deployment-card { background: #0f172a; border-radius: 8px; padding: 14px 20px; margin-bottom: 10px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .deployment-card:last-child { margin-bottom: 0; }
        .deployment-info h4 { color: #e2e8f0; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .deployment-info p { color: #6a7c96; font-size: 12px; }
        .status-pill { padding: 3px 0; border-radius: 20px; font-size: 11px; font-weight: 700; width: 70px; text-align: center; display: inline-block; }
        .status-success { background: #12572c; color: #3aff82; border: 1px solid #16a34a; }
        .status-failed { background: #681616; color: #ff7575; border: 1px solid #b91c1c; }
        .status-pending { background: #1c1917; color: #f59e0b; border: 1px solid #d97706; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1e293b; border-radius: 12px; padding: 32px; width: 420px; border: 1px solid #0ea5e9; }
        .modal-content h3 { color: #ffffff; font-size: 16px; font-weight: 600; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #6a7c96; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .form-group input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 6px; font-size: 13px; outline: none; }
        .form-group input:focus { border-color: #0ea5e9; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 24px; }
        .btn-primary { background: #0ea5e9; color: #ffffff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; flex: 1; font-size: 13px; font-weight: 600; }
        .btn-primary:hover { background: #38bdf8; }
        .btn-cancel { background: #334155; color: #6a7c96; border: 1px solid #334155; padding: 10px 20px; border-radius: 6px; cursor: pointer; flex: 1; font-size: 13px; }
        .btn-cancel:hover { color: #e2e8f0; }

        .empty-state { color: #6a7c96; font-size: 13px; text-align: center; padding: 24px 0; }
        .error-state { color: #ef4444; font-size: 13px; text-align: center; padding: 24px 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-dot"></div>
        <h1>Master Controller</h1>
    </div>
    <div class="header-right">
        <span class="header-time" id="lastUpdated">Not connected</span>
    </div>
</div>

<div class="container">

    <div class="api-key-section">
        <span class="label">API Key</span>
        <input type="text" class="api-key-input" id="apiKeyInput" placeholder="Paste your API key here..." />
        <button class="btn-connect" onclick="loadDashboard()">Connect</button>
    </div>

    <div class="stats">
        <div class="stat-card total">
            <div class="stat-info">
                <h3>Total Hosts</h3>
                <div class="number" id="totalHosts">--</div>
            </div>
        </div>
        <div class="stat-card online">
            <div class="stat-info">
                <h3>Online</h3>
                <div class="number" id="onlineHosts">--</div>
            </div>
        </div>
        <div class="stat-card offline">
            <div class="stat-info">
                <h3>Offline</h3>
                <div class="number" id="offlineHosts">--</div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h2>Registered Hosts</h2>
            <button class="refresh-btn" onclick="loadHosts()">Refresh</button>
        </div>
        <div id="hostsList"><p class="empty-state">Enter API key to load hosts.</p></div>
    </div>

    <div class="section">
        <div class="section-header">
            <h2>Deployment History</h2>
            <button class="refresh-btn" onclick="loadDeployments()">Refresh</button>
        </div>
        <div id="deploymentsList"><p class="empty-state">Enter API key to load deployments.</p></div>
    </div>

</div>

<div class="modal" id="deployModal">
    <div class="modal-content">
        <h3>Deploy Application</h3>
        <div class="form-group">
            <label>App Name</label>
            <input type="text" id="appName" value="MinIO" />
        </div>
        <div class="form-group">
            <label>Script Name</label>
            <input type="text" id="scriptName" value="install-minio.ps1" />
        </div>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" onclick="triggerDeploy()">Deploy</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000';
    let selectedHostId = '';
    let apiKey = '';

    function getHeaders() {
        return {
            'Content-Type': 'application/json',
            'X-API-Key': apiKey
        };
    }

    async function loadDashboard() {
        apiKey = document.getElementById('apiKeyInput').value.trim();
        if (!apiKey) { alert('Please enter API key!'); return; }
        await loadStatus();
        await loadHosts();
        await loadDeployments();
        document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
    }

    async function loadStatus() {
        try {
            const res = await fetch(`${API_BASE}/api/hosts/status`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('totalHosts').textContent = data.totalHosts;
            document.getElementById('onlineHosts').textContent = data.onlineHosts;
            document.getElementById('offlineHosts').textContent = data.offlineHosts;
        } catch (e) { console.error(e); }
    }

    async function loadHosts() {
        try {
            const res = await fetch(`${API_BASE}/api/hosts`, { headers: getHeaders() });
            const hosts = await res.json();
            const container = document.getElementById('hostsList');
            if (hosts.length === 0) {
                container.innerHTML = '<p class="empty-state">No hosts registered yet.</p>';
                return;
            }
            container.innerHTML = hosts.map(host => `
                <div class="host-card">
                    <div class="host-info">
                        <h3>${host.hostname}</h3>
                        <p>${host.ipAddress} &nbsp;·&nbsp; ${host.operatingSystem}</p>
                        <p>Last heartbeat: ${new Date(host.lastHeartbeat).toLocaleString()}</p>
                    </div>
                    <div class="metrics">
                        <div class="metric">
                            <label>CPU</label>
                            <span>${host.cpuUsage}%</span>
                        </div>
                        <div class="metric">
                            <label>Memory</label>
                            <span>${host.memoryUsage}%</span>
                        </div>
                        <div class="metric">
                            <label>Disk</label>
                            <span>${host.diskUsage}%</span>
                        </div>
                    </div>
                    <div class="host-actions">
                        <span class="status-badge ${host.status === 'Online' ? 'status-online' : 'status-offline'}">${host.status}</span>
                        <button class="deploy-btn"
                            ${host.status !== 'Online' ? 'disabled' : ''}
                            onclick="openDeployModal('${host.id}')">
                            Deploy
                        </button>
                        <button class="delete-btn" onclick="deleteHost('${host.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('hostsList').innerHTML = '<p class="error-state">Error loading hosts. Check API key!</p>';
        }
    }

    async function loadDeployments() {
        try {
            const res = await fetch(`${API_BASE}/api/deployments`, { headers: getHeaders() });
            const deployments = await res.json();
            const container = document.getElementById('deploymentsList');
            if (deployments.length === 0) {
                container.innerHTML = '<p class="empty-state">No deployments yet.</p>';
                return;
            }
            container.innerHTML = deployments.map(d => `
                <div class="deployment-card">
                    <div class="deployment-info">
                        <h4>${d.appName} → ${d.hostName}</h4>
                        <p>Script: ${d.scriptName} &nbsp;·&nbsp; Started: ${new Date(d.startedAt).toLocaleString()}</p>
                        ${d.completedAt ? `<p>Completed: ${new Date(d.completedAt).toLocaleString()}</p>` : ''}
                    </div>
                    <span class="status-pill status-${d.status.toLowerCase()}">${d.status}</span>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    async function deleteHost(hostId) {
        if (!confirm('Are you sure you want to delete this host?')) return;
        try {
            const res = await fetch(`${API_BASE}/api/hosts/${hostId}`, {
                method: 'DELETE',
                headers: getHeaders()
            });
            if (res.ok) {
                alert('Host deleted successfully!');
                await loadHosts();
                await loadStatus();
            } else {
                alert('Failed to delete host!');
            }
        } catch (e) {
            alert('Error deleting host!');
        }
    }

    function openDeployModal(hostId) {
        selectedHostId = hostId;
        document.getElementById('deployModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('deployModal').classList.remove('show');
    }

    async function triggerDeploy() {
        const appName = document.getElementById('appName').value;
        const scriptName = document.getElementById('scriptName').value;
        try {
            const res = await fetch(`${API_BASE}/api/deployments/${selectedHostId}/deploy`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ appName, scriptName })
            });
            const data = await res.json();
            alert(`Deployment started! ID: ${data.deploymentId}`);
            closeModal();
            setTimeout(loadDeployments, 2000);
        } catch (e) {
            alert('Deployment failed! Check console.');
        }
    }

    setInterval(loadDashboard, 30000);
</script>

</body>
</html>
